services:
  - type: web
    name: matchmuse
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app_streamlit.py --server.port $PORT --server.address 0.0.0.0 --server.headless true --server.enableCORS false
    envVars:
      - key: OPENAI_API_KEY
        sync: false          # Set this manually in the Render dashboard
      - key: OPENAI_MODEL
        value: gpt-4o
      - key: MATCHMUSE_USERNAME
        sync: false          # Set this manually in the Render dashboard
      - key: MATCHMUSE_PASSWORD
        sync: false          # Set this manually in the Render dashboard
      - key: STREAMLIT_SERVER_HEADLESS
        value: "true"
      - key: STREAMLIT_BROWSER_GATHER_USAGE_STATS
        value: "false"
    healthCheckPath: /
